name: Build on ubuntu against pico-sdk develop
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
  pull_request:
    types: [opened, reopened]
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout kastle2
        uses: actions/checkout@v6
        with:
          path: kastle2

      - name: Checkout pico-sdk
        uses: actions/checkout@v6
        with:
          repository: raspberrypi/pico-sdk
          path: pico-sdk

      - name: Checkout pico-sdk submodules
        working-directory: ${{github.workspace}}/pico-sdk
        run: |
          git submodule update --init

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi

      - name: Configure
        working-directory: ${{github.workspace}}/kastle2
        run: |
          export PICO_SDK_PATH=${{github.workspace}}/pico-sdk
          ./configure.sh

      - name: Build Project
        run: make -C ${{github.workspace}}/kastle2/code/build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{github.ref_name}}
          path: kastle2/code/build/output/*.uf2

      - name: Publish firmware to kastle2-webapps
        if: github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          repository: wonkystuff/kastle2-webapps
          path: kastle2-webapps
          token: ${{ secrets.WEBAPPS_TOKEN }}

      - name: Copy and commit firmware
        if: github.event_name == 'push'
        run: |
          # Set git config
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Create target directory if it doesn't exist
          #mkdir -p kastle2-webapps/wave-bard-sample-loader/public/firmwares
          
          # Copy firmware with version (branch name)
          cp kastle2/code/build/output/kastle2-wave-bard.uf2 "kastle2-webapps/wave-bard-sample-loader/public/firmwares/kastle2-wave-bard-${{ github.ref_name }}.uf2"
          
          # Change to webapps directory and commit
          cd kastle2-webapps
          git add "wave-bard-sample-loader/public/firmwares/kastle2-wave-bard-${{ github.ref_name }}.uf2"
          git commit -m "Update wave-bard firmware from ${{ github.ref_name }} branch (commit ${{ github.sha }})"
          git push

      - name: release
        uses: actions/create-release@v1
        id: create_release
        with:
          draft: false
          prerelease: false
          release_name: k2-${{github.ref}}
          tag_name: k2-${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
