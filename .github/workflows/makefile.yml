name: Build on ubuntu against pico-sdk develop
on:
  workflow_dispatch:
  #push:
  #  branches:
  #    - 'develop'
  #    - 'main'
  pull_request:
    types: [opened, reopened]
    branches:
      - 'develop'
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
      - name: Checkout kastle2
        uses: actions/checkout@v4
        with:
          path: kastle2

      - name: Checkout pico-sdk
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          path: pico-sdk

      - name: Checkout pico-sdk submodules
        working-directory: ${{github.workspace}}/pico-sdk
        run: |
          git submodule update --init

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi

      - name: Configure
        working-directory: ${{github.workspace}}/kastle2
        run: |
          export PICO_SDK_PATH=${{github.workspace}}/pico-sdk
          ./configure.sh
        
      - name: Build Project
        run: make -C ${{github.workspace}}/kastle2/code/build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: kastle2/code/build/output/
