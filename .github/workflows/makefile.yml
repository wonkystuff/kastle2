name: Build on ubuntu against pico-sdk develop
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
  pull_request:
    types: [opened, reopened]
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout kastle2
        uses: actions/checkout@v6
        with:
          path: kastle2

      - name: Checkout pico-sdk
        uses: actions/checkout@v6
        with:
          repository: raspberrypi/pico-sdk
          path: pico-sdk

      - name: Checkout pico-sdk submodules
        working-directory: ${{github.workspace}}/pico-sdk
        run: |
          git submodule update --init

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi

      - name: Configure
        working-directory: ${{github.workspace}}/kastle2
        run: |
          export PICO_SDK_PATH=${{github.workspace}}/pico-sdk
          ./configure.sh

      - name: Build Project
        run: make -C ${{github.workspace}}/kastle2/code/build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{github.ref_name}}
          path: kastle2/code/build/output/*.uf2

      - name: release
        uses: actions/create-release@v1
        id: create_release
        with:
          draft: false
          prerelease: false
          release_name: k2-${{github.ref}}
          tag_name: k2-${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

